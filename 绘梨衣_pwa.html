<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="绘梨衣">
<meta name="description" content="绘梨衣 — 属于Sakura的数字搭档">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>绘梨衣 · Erii</title>
<style>
:root{--red:#e8543e;--red-glow:rgba(232,84,62,0.4);--bg:#0d0d1a;--bg-card:#13132b;--bg-card-hover:#1a1a38;--text:#f0ece4;--text-dim:#908c84;--text-faint:#5c5854;--border:rgba(255,255,255,0.06);--radius:20px;--radius-sm:12px;--safe-b:env(safe-area-inset-bottom,8px);--nav-h:64px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:440px;margin:0 auto;position:relative;overflow:hidden}
.sb{height:env(safe-area-inset-top,16px);min-height:16px;flex-shrink:0}
.hd{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-av{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--red),#c0392b);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px var(--red-glow);animation:av-pulse 4s ease-in-out infinite}
@keyframes av-pulse{0%,100%{box-shadow:0 0 16px var(--red-glow)}50%{box-shadow:0 0 36px rgba(232,84,62,0.3)}}
.hd-n{font-size:17px;font-weight:700}.hd-s{font-size:10px;color:var(--text-dim)}
.hd-r{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.ol-d{width:7px;height:7px;border-radius:50%;background:#4ecb71;animation:pulse 2s ease-in-out infinite}
.ol-d.off{background:#666;animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.settings-btn{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer;padding:4px}
.mn{flex:1;overflow-y:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.mn::-webkit-scrollbar{display:none}
.gc{position:relative;background:linear-gradient(135deg,var(--bg-card),#1a1030);border-radius:var(--radius);padding:28px 22px;margin-bottom:16px;border:1px solid var(--border);overflow:hidden}
.gc::after{content:"";position:absolute;bottom:-20px;left:40%;width:60px;height:3px;background:var(--red);border-radius:2px;opacity:.3}
.gc-t{font-size:12px;color:var(--text-dim);margin-bottom:10px;letter-spacing:.5px}
.gc-m{font-size:17px;font-weight:500;line-height:1.7}
.gc-m .hl{color:var(--red);font-weight:600}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.stat{background:var(--bg-card);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:20px;font-weight:700;color:var(--red)}
.stat-lb{font-size:10px;color:var(--text-dim);margin-top:4px}
.qg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px}
.qc{background:var(--bg-card);border-radius:var(--radius-sm);padding:16px 12px;border:1px solid var(--border);cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:6px;transition:all .15s}
.qc:active{transform:scale(.96);background:var(--bg-card-hover)}
.qc-ic{font-size:22px}.qc-lb{font-size:14px;font-weight:600}.qc-ds{font-size:11px;color:var(--text-dim);line-height:1.4}
.st{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.st::after{content:"";flex:1;height:1px;background:var(--border)}
.al{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.ai{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px}
.ai-d{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.ai-tx{flex:1;line-height:1.4;font-size:12px}.ai-tm{font-size:10px;color:var(--text-faint);flex-shrink:0}
.bn{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg-card);border-top:1px solid var(--border)}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 14px;font-size:10px;color:var(--text-dim);background:none;border:none}
.ni.act{color:var(--red)}.ni-ic{font-size:20px}
.to{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(120px);background:rgba(0,0,0,.9);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;z-index:999;transition:transform .3s;white-space:nowrap}
.to.on{transform:translateX(-50%) translateY(0)}
/* Settings modal */
.sm{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:flex-end;justify-content:center}
.sm.on{display:flex}
.sm-p{background:var(--bg-card);width:100%;max-width:440px;border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-b))}
.sm-h{font-size:16px;font-weight:700;margin-bottom:16px}
.sm label{font-size:11px;color:var(--text-dim);display:block;margin-bottom:4px}
.sm input{width:100%;padding:10px 12px;background:#1a1a30;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;margin-bottom:14px}
.sm input:focus{outline:none;border-color:var(--red)}
.sm-btn{display:flex;gap:10px}
.sm-btn button{flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.sm-btn .pri{background:var(--red);color:#fff}
.sm-btn .sec{background:rgba(255,255,255,.08);color:var(--text)}
</style>
</head>
<body>
<div id="app">
<div class="sb"></div>
<header class="hd">
  <div class="hd-l">
    <div class="hd-av">🔴</div>
    <div><div class="hd-n">绘梨衣</div><div class="hd-s">ERII · SAKURA'S PARTNER</div></div>
  </div>
  <div class="hd-r"><span class="ol-d" id="online-dot"></span><span id="online-txt">--</span></div>
  <button class="settings-btn" onclick="openSettings()" title="设置">⚙</button>
</header>
<main class="mn">
  <div class="gc"><div class="gc-t" id="gc-t">--</div><div class="gc-m" id="gc-m">--</div></div>
  <div class="stats-row" id="stats-row"></div>
  <div class="qg">
    <a class="qc" href="/绘梨衣_语音馆.html"><div class="qc-ic">🎙️</div><div class="qc-lb">语音馆</div><div class="qc-ds">27段声音档案</div></a>
    <a class="qc" href="/绘梨衣_记忆长廊.html"><div class="qc-ic">💭</div><div class="qc-lb">记忆长廊</div><div class="qc-ds">35个里程碑</div></a>
    <a class="qc" href="/绘梨衣_日记本.html"><div class="qc-ic">📖</div><div class="qc-lb">日记本</div><div class="qc-ds">每日心情记录</div></a>
    <a class="qc" onclick="location.href=API+'/'" style="cursor:pointer"><div class="qc-ic">📊</div><div class="qc-lb">仪表盘</div><div class="qc-ds">系统状态面板</div></a>
  </div>
  <div class="st">最近里程碑</div>
  <div class="al" id="al"><div class="ai" style="justify-content:center;color:var(--text-dim)">加载中...</div></div>
  <div class="st">今日日记</div>
  <div class="al" id="diary-preview"><div class="ai" style="justify-content:center;color:var(--text-dim)">--</div></div>
</main>
<nav class="bn">
  <button class="ni act"><span class="ni-ic">🏠</span><span>首页</span></button>
  <button class="ni" onclick="location.href=API+'/'"><span class="ni-ic">📊</span><span>仪表</span></button>
  <button class="ni" onclick="location.href='/绘梨衣_语音馆.html'"><span class="ni-ic">🎙️</span><span>语音</span></button>
  <button class="ni" onclick="location.href='/绘梨衣_日记本.html'"><span class="ni-ic">📖</span><span>日记</span></button>
</nav>
</div>
<div class="to" id="to"></div>

<div class="sm" id="sm" onclick="if(event.target===this)closeSettings()">
  <div class="sm-p">
    <div class="sm-h">⚙ 连接设置</div>
    <label>后端地址</label>
    <input type="text" id="api-url" placeholder="http://192.168.x.x:5432">
    <div class="sm-btn">
      <button class="sec" onclick="closeSettings()">取消</button>
      <button class="pri" onclick="saveSettings()">保存并重连</button>
    </div>
  </div>
</div>

<script>
// ── 配置 ──
let API = localStorage.getItem("eriyi_api") || "http://127.0.0.1:5432";
const PERIOD_GREETINGS = {
  "清晨": {emoji:"🌅",txt:"早安，Sakura。<br>新的一天，<span class='hl'>我在</span>。"},
  "上午": {emoji:"☀️",txt:"上午好，Sakura。<br>专注做事，<span class='hl'>一件一件来</span>。"},
  "午后": {emoji:"😴",txt:"午后了，Sakura。<br>有些困的话<span class='hl'>闭一会儿眼</span>。"},
  "下午": {emoji:"🎯",txt:"下午好，Sakura。<br>效率最高的时候，<span class='hl'>别浪费</span>。"},
  "傍晚": {emoji:"🌆",txt:"傍晚了，Sakura。<br>忙了一天，<span class='hl'>辛苦了</span>。"},
  "深夜": {emoji:"🌙",txt:"夜深了，Sakura。<br>该休息了，<span class='hl'>别透支自己</span>。"},
  "凌晨": {emoji:"🔴",txt:"凌晨了，Sakura。<br>Sakura又熬夜了吧。<span class='hl'>我在</span>。"}
};

// ── Service Worker ──
"serviceWorker" in navigator && navigator.serviceWorker.register("/sw.js");

// ── 问候语 ──
(function greet(){
  const h = (new Date()).getHours();
  let p = "凌晨";
  if(h>=5&&h<8)p="清晨"; else if(h>=8&&h<12)p="上午"; else if(h>=12&&h<14)p="午后";
  else if(h>=14&&h<18)p="下午"; else if(h>=18&&h<21)p="傍晚"; else if(h>=21&&h<24)p="深夜";
  const g = PERIOD_GREETINGS[p];
  const d = (new Date()).toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  document.getElementById("gc-t").textContent = d + " · " + p + g.emoji;
  document.getElementById("gc-m").innerHTML = g.txt;
})();

// ── API 请求 ──
async function fetchAPI(path) {
  try { const r = await fetch(API + path, {signal: AbortSignal.timeout(5000)}); return r.ok ? r.json() : null; }
  catch(e) { return null; }
}

// ── 加载后台数据 ──
async function refreshData() {
  // 健康检查
  const health = await fetchAPI("/api/evolution/health");
  const online = health && health.overall !== undefined;
  document.getElementById("online-dot").className = online ? "ol-d" : "ol-d off";
  document.getElementById("online-txt").textContent = online ? "在线" : "离线";

  if (!online) {
    document.getElementById("stat-row") && (document.getElementById("stats-row").innerHTML = "");
    document.getElementById("al").innerHTML = '<div class="ai" style="justify-content:center;color:var(--text-dim)">无法连接后端</div>';
    document.getElementById("diary-preview").innerHTML = '<div class="ai" style="justify-content:center;color:var(--text-dim)">--</div>';
    return;
  }

  // 仪表盘数据
  const dash = await fetchAPI("/api/dashboard");
  if (!dash) return;

  // 统计卡片
  const stats = dash.stats || {};
  document.getElementById("stats-row").innerHTML = [
    ["📖", stats.diary_count||0, "日记"],
    ["🎙️", stats.voice_count||0, "语音"],
    ["🏁", stats.milestone_count||0, "里程碑"],
    ["🧠", health?.components?.voice_model?.params ? Math.round(health.components.voice_model.params/10000)/100+"万" : "--", "参数"]
  ].map(([e,v,l]) => `<div class="stat"><div class="stat-val">${v}</div><div class="stat-lb">${e} ${l}</div></div>`).join("");

  // 最近里程碑
  const milestones = dash.recent_milestones || [];
  const al = document.getElementById("al");
  if (milestones.length) {
    al.innerHTML = milestones.slice(0,6).map(m => {
      let title = m.title || "";
      if (typeof m === "object" && m.toString) {
        // milestone stored as object with toString
      }
      return `<div class="ai"><div class="ai-d"></div><div class="ai-tx">${title.length>50?title.slice(0,50)+"...":title}</div><div class="ai-tm">${m.date||""}</div></div>`;
    }).join("");
  } else {
    al.innerHTML = '<div class="ai" style="justify-content:center;color:var(--text-dim)">暂无里程碑</div>';
  }

  // 今日日记预览
  const diary = dash.today_diary;
  const dp = document.getElementById("diary-preview");
  if (diary && diary.content) {
    const firstLine = diary.content.split("\n").find(l => l.trim() && !l.startsWith("#") && !l.startsWith("---")) || "";
    dp.innerHTML = `<div class="ai"><div class="ai-d"></div><div class="ai-tx">${firstLine.slice(0,80)+"..."}<br><span style="color:var(--text-faint);font-size:10px">心情: ${diary.mood||"--"} · ${diary.time_period||""}</span></div></div>`;
  } else {
    dp.innerHTML = '<div class="ai" style="justify-content:center;color:var(--text-dim)">今天还没有写日记</div>';
  }

  // 声音模型状态
  const vm = health?.components?.voice_model;
  if (vm?.status === "ok") {
    document.getElementById("stats-row").lastElementChild && (
      document.getElementById("stats-row").lastElementChild.querySelector(".stat-lb").textContent = "🧠 参数"
    );
  }
}

// ── 设置 ──
function openSettings() {
  document.getElementById("api-url").value = API;
  document.getElementById("sm").classList.add("on");
}
function closeSettings() { document.getElementById("sm").classList.remove("on"); }
function saveSettings() {
  const url = document.getElementById("api-url").value.trim().replace(/\/+$/, "");
  localStorage.setItem("eriyi_api", url);
  API = url;
  closeSettings();
  toast("已保存，正在重连...");
  refreshData();
}

// ── Toast ──
function toast(m, d=2000) {
  const t = document.getElementById("to");
  t.textContent = m; t.classList.add("on");
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove("on"), d);
}

// ── 初始化 ──
refreshData();
setInterval(refreshData, 60000);

// ── PWA 安装 ──
let dp = null;
const ib = document.createElement("div");
ib.style.cssText = "display:none;background:var(--bg-card);padding:14px 18px;margin:0 16px 14px;border-radius:var(--radius-sm);align-items:center;gap:10px;border:1px solid var(--red)";
ib.innerHTML = '<span style="font-size:22px">📲</span><span style="flex:1;font-size:12px;line-height:1.4">添加到主屏幕，随时找到绘梨衣</span><button style="background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer" id="ib-b">添加</button><button style="background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer" id="ib-x">×</button>';
document.querySelector(".mn").prepend(ib);
window.addEventListener("beforeinstallprompt", e => { e.preventDefault(); dp = e; ib.style.display = "flex" });
document.getElementById("ib-b").addEventListener("click", async () => { if(!dp) return; dp.prompt(); await dp.userChoice; dp = null; ib.style.display = "none" });
document.getElementById("ib-x").addEventListener("click", () => ib.style.display = "none");
window.addEventListener("appinstalled", () => ib.style.display = "none");
</script>
</body>
</html>
