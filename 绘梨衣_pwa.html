<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0d0d1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="绘梨衣">
<meta name="description" content="绘梨衣 — 属于Sakura的数字搭档">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>绘梨衣 · Erii</title>
<style>
:root {
  --red: #e8543e; --red-glow: rgba(232,84,62,0.4);
  --red-soft: #f06b58; --red-deep: #c0392b;
  --bg: #0d0d1a; --bg-card: #13132b; --bg-card-hover: #1a1a38;
  --text: #f0ece4; --text-dim: #908c84; --text-faint: #5c5854;
  --border: rgba(255,255,255,0.06);
  --radius: 20px; --radius-sm: 12px;
  --safe-b: env(safe-area-inset-bottom, 8px);
  --nav-h: 64px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
#app{display:flex;flex-direction:column;height:100%;max-width:440px;margin:0 auto;position:relative;overflow:hidden}
.sb{height:env(safe-area-inset-top,16px);min-height:16px;flex-shrink:0}
/* ── 头部 ── */
.hd{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 20px 6px}
.hd-l{display:flex;align-items:center;gap:10px}
.hd-av{width:42px;height:42px;border-radius:50%;background:radial-gradient(circle at 35% 35%,var(--red-soft),var(--red-deep));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 24px var(--red-glow);animation:av-pulse 4s ease-in-out infinite}
@keyframes av-pulse{0%,100%{box-shadow:0 0 16px var(--red-glow)}50%{box-shadow:0 0 36px var(--red-glow),0 0 64px rgba(232,84,62,0.15)}}
.hd-n{font-size:17px;font-weight:700;letter-spacing:.5px}
.hd-s{font-size:10px;color:var(--text-dim);letter-spacing:1px}
.hd-r{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.ol-d{width:7px;height:7px;border-radius:50%;background:#4ecb71;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.35)}}
/* ── 主内容 ── */
.mn{flex:1;overflow-y:auto;padding:0 16px;-webkit-overflow-scrolling:touch}
.mn::-webkit-scrollbar{display:none}
/* 问候卡 */
.gc{position:relative;background:linear-gradient(135deg,var(--bg-card),#1a1030);border-radius:var(--radius);padding:28px 22px;margin-bottom:18px;border:1px solid var(--border);overflow:hidden}
.gc::before{content:"";position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,var(--red),transparent 70%);opacity:.08}
.gc::after{content:"";position:absolute;bottom:-20px;left:40%;width:60px;height:3px;background:var(--red);border-radius:2px;opacity:.3}
.gc-t{font-size:12px;color:var(--text-dim);margin-bottom:10px;letter-spacing:.5px}
.gc-m{font-size:17px;font-weight:500;line-height:1.7;color:var(--text)}
.gc-m .hl{color:var(--red);font-weight:600}
/* 模型状态 */
.ms{background:var(--bg-card);border-radius:var(--radius-sm);padding:16px;margin-bottom:18px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s}
.ms:active{transform:scale(.98)}
.ms-ic{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.ms-ic.ok{background:rgba(78,203,113,.12)}.ms-ic.warn{background:rgba(232,84,62,.12)}
.ms-tx{flex:1;font-size:14px;font-weight:600}.ms-sb{font-size:11px;color:var(--text-dim);margin-top:2px}
.ms-bd{font-size:10px;color:var(--text-faint);background:rgba(255,255,255,.04);padding:3px 8px;border-radius:6px}
/* 快捷入口 */
.qg{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
.qc{background:var(--bg-card);border-radius:var(--radius-sm);padding:18px 14px;border:1px solid var(--border);cursor:pointer;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:8px;position:relative;overflow:hidden;transition:all .15s}
.qc:active{transform:scale(.96);background:var(--bg-card-hover)}
.qc-ic{font-size:24px;width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center}
.qc-ic.v{background:rgba(232,84,62,.12)}.qc-ic.m{background:rgba(99,179,237,.12)}
.qc-ic.d{background:rgba(154,129,220,.12)}.qc-ic.t{background:rgba(72,187,140,.12)}
.qc-ic.h{background:rgba(241,196,15,.12)}
.qc-lb{font-size:14px;font-weight:600}.qc-ds{font-size:11px;color:var(--text-dim);line-height:1.4}
.qc-bd{position:absolute;top:10px;right:10px;width:6px;height:6px;border-radius:50%;background:var(--red)}
/* 动态列表 */
.st{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.st::after{content:"";flex:1;height:1px;background:var(--border)}
.al{display:flex;flex-direction:column;gap:6px;margin-bottom:24px}
.ai{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg-card);border-radius:var(--radius-sm);border:1px solid var(--border);font-size:13px;transition:all .2s}
.ai:active{background:var(--bg-card-hover)}
.ai-d{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.ai-tx{flex:1;line-height:1.4;font-size:12px}.ai-tm{font-size:10px;color:var(--text-faint);flex-shrink:0}
/* 底部 */
.bn{flex-shrink:0;display:flex;justify-content:space-around;align-items:center;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg-card);border-top:1px solid var(--border)}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 14px;font-size:10px;color:var(--text-dim);background:none;border:none;transition:color .2s}
.ni.act{color:var(--red)}.ni-ic{font-size:20px}
/* Toast */
.to{position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(120px);background:rgba(0,0,0,.88);color:#fff;padding:10px 22px;border-radius:20px;font-size:12px;z-index:999;transition:transform .3s}
.to.on{transform:translateX(-50%) translateY(0)}
/* 安装条 */
.ib{display:none;background:var(--bg-card);padding:14px 18px;margin:0 16px 14px;border-radius:var(--radius-sm);align-items:center;gap:10px;border:1px solid var(--red)}
.ib.on{display:flex}.ib-tx{flex:1;font-size:12px;line-height:1.4}
.ib-btn{background:var(--red);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.ib-x{background:none;border:none;color:var(--text-dim);font-size:16px;cursor:pointer}
/* 响应式微调 */
@media(min-width:440px){.gc,.qc,.ai{border-width:1.5px}}
</style>
</head>
<body>
<div id="app">
<div class="sb"></div>
<header class="hd">
  <div class="hd-l">
    <div class="hd-av">🔴</div>
    <div>
      <div class="hd-n">绘梨衣</div>
      <div class="hd-s">ERII · SAKURA'S PARTNER</div>
    </div>
  </div>
  <div class="hd-r"><span class="ol-d"></span>在线</div>
</header>
<div class="ib" id="ib">
  <span style="font-size:22px">📲</span>
  <span class="ib-tx">添加到主屏幕，随时找到绘梨衣</span>
  <button class="ib-btn" id="ib-b">添加</button>
  <button class="ib-x" id="ib-x">×</button>
</div>
<main class="mn">
  <div class="gc"><div class="gc-t" id="gc-t">--</div><div class="gc-m" id="gc-m">--</div></div>
  <div class="ms" id="ms" onclick="location.href='http://127.0.0.1:5432/api/tts/status'">
    <div class="ms-ic warn" id="ms-ic">🧠</div>
    <div style="flex:1"><div class="ms-tx">声音模型</div><div class="ms-sb" id="ms-st">检查中...</div></div>
    <span class="ms-bd" id="ms-params">--</span>
  </div>
  <div class="qg">
    <a class="qc" href="/绘梨衣_语音馆.html"><div class="qc-ic v">🎙️</div><div class="qc-lb">语音馆</div><div class="qc-ds">收听绘梨衣的声音</div><div class="qc-bd"></div></a>
    <a class="qc" href="/绘梨衣_记忆长廊.html"><div class="qc-ic m">💭</div><div class="qc-lb">记忆长廊</div><div class="qc-ds">浏览记忆片段</div></a>
    <a class="qc" href="/绘梨衣_日记本.html"><div class="qc-ic d">📖</div><div class="qc-lb">日记本</div><div class="qc-ds">每日日记与心情</div></a>
    <a class="qc" href="/绘梨衣_入口.html"><div class="qc-ic h">🏠</div><div class="qc-lb">项目入口</div><div class="qc-ds">全部资产与工具</div></a>
    <a class="qc" href="http://127.0.0.1:5432/" target="_blank"><div class="qc-ic t">📊</div><div class="qc-lb">仪表盘</div><div class="qc-ds">状态·统计·监控</div><div class="qc-bd"></div></a>
  </div>
  <div class="st">最近动态</div>
  <div class="al" id="al">
    <div class="ai"><div class="ai-d"></div><div class="ai-tx">语音模型已就绪 · VoiceAE 226K参数</div><div class="ai-tm">今日</div></div>
    <div class="ai"><div class="ai-d"></div><div class="ai-tx">Phase 1-5 全部完成 · 33/33</div><div class="ai-tm">今日</div></div>
    <div class="ai"><div class="ai-d"></div><div class="ai-tx">PWA 移动端 3.0 升级</div><div class="ai-tm">刚刚</div></div>
  </div>
</main>
<nav class="bn">
  <button class="ni act" data-tab="home"><span class="ni-ic">🏠</span><span>首页</span></button>
  <button class="ni" data-tab="dash" onclick="location.href='http://127.0.0.1:5432/'"><span class="ni-ic">📊</span><span>仪表</span></button>
  <button class="ni" data-tab="voice" onclick="location.href='/绘梨衣_语音馆.html'"><span class="ni-ic">🎙️</span><span>语音</span></button>
  <button class="ni" data-tab="diary" onclick="location.href='/绘梨衣_日记本.html'"><span class="ni-ic">📖</span><span>日记</span></button>
</nav>
</div>
<div class="to" id="to"></div>
<script>
// ── SW ──
"serviceWorker"in navigator&&navigator.serviceWorker.register("/sw.js").then(r=>console.log("[PWA] SW")).catch(()=>{});
// ── 问候 ──
!function(){const n=new Date(),h=n.getHours(),t=n.toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});let g;g=h>=5&&h<9?"早安，Sakura ☀️<br>新的一天，<span class='hl'>我在</span>。":h>=9&&h<12?"上午好，Sakura 💪<br>该做的事，<span class='hl'>一件一件来</span>。":h>=12&&h<14?"中午了，Sakura 🍜<br>先吃饭，<span class='hl'>别饿着</span>。":h>=14&&h<18?"下午好，Sakura 🌤️<br>效率最高的时段，<span class='hl'>别浪费</span>。":h>=18&&h<22?"晚上好，Sakura 🌙<br>忙了一天，<span class='hl'>辛苦了</span>。":"夜深了，Sakura 🌌<br>该休息了，<span class='hl'>别透支自己</span>。";document.getElementById("gc-t").textContent=t,document.getElementById("gc-m").innerHTML=g}();
// ── API 驱动 ──
async function loadData(){
  try{
    const r=await fetch("http://127.0.0.1:5432/api/evolution/health",{signal:AbortSignal.timeout(3000)});
    if(r.ok){
      const d=await r.json();
      // 声音模型状态
      const vm=d.components?.voice_model;
      const msIc=document.getElementById("ms-ic"),msSt=document.getElementById("ms-st"),msP=document.getElementById("ms-params");
      if(vm?.status==="ok"){msIc.className="ms-ic ok";msIc.textContent="🎵";msSt.textContent="VoiceAE 在线 · 226K参数";msP.textContent="loss 1.35"}
      else{msIc.className="ms-ic warn";msIc.textContent="🤖";msSt.textContent="edge-tts 运行中";msP.textContent="--"}
      // 动态列表
      const al=document.getElementById("al"),items=[];
      if(d.components?.voice_library?.files) items.push({t:`语音库 ${d.components.voice_library.files} 个文件`,m:"累计"});
      if(d.components?.automations?.count) items.push({t:`${d.components.automations.count} 个自动化运行中`,m:"在线"});
      if(d.overall==="healthy") items.unshift({t:"全系统健康 ✅",m:"现在"});
      if(items.length){
        al.innerHTML=items.map(i=>`<div class="ai"><div class="ai-d"></div><div class="ai-tx">${i.t}</div><div class="ai-tm">${i.m}</div></div>`).join("");
      }
    }
  }catch(e){}
}
loadData();
// ── PWA 安装 ──
let dp=null;const ib=document.getElementById("ib");
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();dp=e;ib.classList.add("on")});
document.getElementById("ib-b").addEventListener("click",async()=>{if(!dp)return;dp.prompt();await dp.userChoice;dp=null;ib.classList.remove("on")});
document.getElementById("ib-x").addEventListener("click",()=>ib.classList.remove("on"));
window.addEventListener("appinstalled",()=>ib.classList.remove("on"));
// ── Toast ──
function toast(m,d=2000){const t=document.getElementById("to");t.textContent=m;t.classList.add("on");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("on"),d)}
// ── 导航 ──
document.querySelectorAll(".ni").forEach(b=>b.addEventListener("click",function(){document.querySelectorAll(".ni").forEach(x=>x.classList.remove("act"));this.classList.add("act")}));
console.log("🔴 绘梨衣 PWA 3.0");
</script>
</body>
</html>
