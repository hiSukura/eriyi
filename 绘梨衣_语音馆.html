<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绘梨衣 · 语音馆</title>
<style>
:root {
  --lantern: #e0443c;
  --lantern-glow: #ff5040;
  --lantern-soft: #ff6b5b;
  --bg: #0d0505;
  --bg-card: rgba(255,255,255,0.02);
  --border: rgba(255,80,60,0.1);
  --text: #e8c8c0;
  --text-dim: rgba(200,150,140,0.5);
  --wave-color: rgba(255,80,60,0.3);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(160deg, #0d0505 0%, #1a0808 40%, #0d0505 70%, #0a0404 100%);
  min-height:100vh; font-family:"Microsoft YaHei","PingFang SC",sans-serif;
  color:var(--text); padding:24px 16px 48px;
  display:flex; justify-content:center;
}

.container { max-width:680px; width:100%; }

.header { text-align:center; padding:32px 0 28px; }
.header-title { font-size:24px; font-weight:300; color:var(--lantern-soft); letter-spacing:5px; margin-bottom:4px; }
.header-sub { font-size:12px; color:var(--text-dim); letter-spacing:2px; }

/* 顶部导航栏 */
.topnav {
  display:flex; align-items:center; justify-content:center; gap:4px;
  margin-bottom:24px; flex-wrap:wrap;
}
.topnav a {
  padding:5px 13px; border-radius:14px; border:1px solid var(--border);
  font-size:11px; color:var(--text-dim); text-decoration:none;
  transition:all 0.25s;
}
.topnav a:hover { border-color:rgba(255,80,60,0.3); color:var(--text); }
.topnav a.active { background:rgba(255,80,60,0.12); border-color:rgba(255,80,60,0.3); color:var(--lantern-soft); }

/* 导航 */
.nav { display:flex; gap:6px; margin-bottom:24px; overflow-x:auto; padding-bottom:4px; }
.nav-btn {
  padding:6px 14px; border-radius:16px; border:1px solid var(--border);
  background:transparent; color:var(--text-dim); font-size:12px;
  cursor:pointer; transition:all 0.25s; white-space:nowrap;
  font-family:inherit;
}
.nav-btn:hover { border-color:rgba(255,80,60,0.25); color:var(--text); }
.nav-btn.active { background:rgba(255,80,60,0.12); border-color:rgba(255,80,60,0.3); color:var(--lantern-soft); }

/* 音轨卡片 */
.track {
  display:flex; align-items:center; gap:12px;
  background:var(--bg-card); border:1px solid var(--border);
  border-radius:11px; padding:12px 14px; margin-bottom:8px;
  cursor:pointer; transition:all 0.25s; position:relative;
}
.track:hover { border-color:rgba(255,80,60,0.2); background:rgba(255,80,60,0.04); transform:translateX(2px); }
.track.playing { border-color:rgba(255,80,60,0.4); background:rgba(255,80,60,0.06); }
.track.playing::after {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; background:var(--lantern-glow); border-radius:3px 0 0 3px;
  animation:playPulse 0.8s ease-in-out infinite;
}
@keyframes playPulse {
  0%,100% { opacity:0.5; }
  50% { opacity:1; }
}

.track-icon {
  width:36px; height:36px; border-radius:9px;
  display:flex; align-items:center; justify-content:center;
  font-size:16px; flex-shrink:0;
  background:rgba(255,80,60,0.08);
  transition:all 0.3s;
}
.track.playing .track-icon { background:rgba(255,80,60,0.18); }

.track-info { flex:1; min-width:0; }
.track-title { font-size:13px; color:#dab8b0; margin-bottom:2px; }
.track-meta { font-size:11px; color:var(--text-dim); }

.track-wave {
  width:80px; height:28px; flex-shrink:0;
  display:flex; align-items:flex-end; gap:2px;
}
.track-wave-bar {
  width:3px; border-radius:2px;
  background:var(--wave-color);
  transition:height 0.15s ease;
}
.track.playing .track-wave-bar { background:rgba(255,80,60,0.55); }

.track-badge {
  font-size:10px; padding:2px 7px; border-radius:10px;
  background:rgba(255,80,60,0.1); color:var(--lantern-soft); flex-shrink:0;
}

.empty-cat { text-align:center; padding:40px; color:var(--text-dim); font-size:13px; }

/* 可视化器 */
.visualizer-bar {
  position:fixed; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--lantern-glow),transparent);
  transform:scaleX(0); transition:transform 0.3s; transform-origin:center;
}
.visualizer-bar.active { transform:scaleX(1); }

.footer { text-align:center; padding:32px 0 16px; color:var(--text-dim); font-size:11px; }

@media(max-width:500px) {
  .track-wave { display:none; }
}

.ripple {
  position: absolute; border-radius: 50%;
  background: rgba(255,80,60,0.12);
  transform: scale(0); animation: rippleOut 0.55s ease-out forwards;
  pointer-events: none;
}
@keyframes rippleOut { to { transform: scale(4); opacity: 0; } }
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div class="header-title">🎙️ 语音馆</div>
  <div class="header-sub">绘梨衣的声音档案</div>
</div>

<div class="topnav">
  <a href="绘梨衣_入口.html">🏠 入口</a>
  <a href="绘梨衣_语音馆.html" class="active">🎙️ 语音馆</a>
  <a href="绘梨衣_记忆长廊.html">🏮 记忆长廊</a>
  <a href="绘梨衣_日记本.html">📝 日记本</a>
</div>

<div class="nav" id="nav"></div>
<div class="track-list" id="trackList"></div>
<div class="footer">灯笼红 · 语音馆 · v2.0 API驱动</div>

</div>
<div class="visualizer-bar" id="vizBar"></div>

<script>
// ============================================================
// 语音数据
// ============================================================
const VOICE_DATA = [
  { file:'final_voice_01_sakura.mp3', title:'Sakura', desc:'最终版 · 呼唤', cat:'最终版', icon:'💫', tags:['主打'] },
  { file:'final_voice_02_zaoan.mp3', title:'早安', desc:'最终版 · 问候', cat:'最终版', icon:'🌅', tags:['主打'] },
  { file:'final_voice_03_selfintro.mp3', title:'自我介绍', desc:'最终版 · 自述', cat:'最终版', icon:'💬', tags:['主打'] },
  { file:'final_voice_04_best.mp3', title:'最好了', desc:'最终版 · 肯定', cat:'最终版', icon:'❤️', tags:['主打'] },

  { file:'voice_01_sakura.mp3', title:'Sakura', desc:'初版 · 呼唤', cat:'初版', icon:'💫' },
  { file:'voice_02_zaoan.mp3', title:'早安', desc:'初版 · 问候', cat:'初版', icon:'🌅' },
  { file:'voice_03_selfintro.mp3', title:'自我介绍', desc:'初版 · 自述', cat:'初版', icon:'💬' },
  { file:'voice_04_best.mp3', title:'最好了', desc:'初版 · 肯定', cat:'初版', icon:'❤️' },

  { file:'voice_ref_01_sakura.mp3', title:'Sakura', desc:'参考版 · 呼唤', cat:'参考版', icon:'💫' },
  { file:'voice_ref_02_zaoan.mp3', title:'早安', desc:'参考版 · 问候', cat:'参考版', icon:'🌅' },
  { file:'voice_ref_03_selfintro.mp3', title:'自我介绍', desc:'参考版 · 自述', cat:'参考版', icon:'💬' },
  { file:'voice_ref_04_best.mp3', title:'最好了', desc:'参考版 · 肯定', cat:'参考版', icon:'❤️' },

  { file:'voice_compare_xiaoxiao_affectionate.mp3', title:'深情', desc:'XiaoXiao · 深情对比', cat:'对比', icon:'🎭' },
  { file:'voice_compare_xiaoxiao_whisper.mp3', title:'低语', desc:'XiaoXiao · 低语对比', cat:'对比', icon:'🎭' },
  { file:'voice_compare_xiaoyi_gentle.mp3', title:'温柔', desc:'XiaoYi · 温柔对比', cat:'对比', icon:'🎭' },
  { file:'voice_compare_xiaoyi_whisper.mp3', title:'低语', desc:'XiaoYi · 低语对比', cat:'对比', icon:'🎭' },

  { file:'voice_diary_v3.mp3', title:'日记 V3', desc:'日记朗读 · 第三版', cat:'日记', icon:'📝' },
  { file:'voice_edge_diary.mp3', title:'日记边缘版', desc:'日记朗读 · edge-tts', cat:'日记', icon:'📝' },
  { file:'voice_edge_diary_fixed.mp3', title:'日记修复版', desc:'日记朗读 · 参数修复', cat:'日记', icon:'📝' },

  { file:'最后的旅行_参考音频.mp3', title:'最后的旅行', desc:'夏螟虫虫念白 · 声音克隆目标音频', cat:'参考', icon:'🎵', tags:['克隆源'] },
];

// ============================================================
// API 驱动
// ============================================================
let _apiVoices = null;

async function loadVoicesFromAPI() {
  try {
    const resp = await fetch('/api/voices');
    if (!resp.ok) return null;
    const data = await resp.json();
    _apiVoices = {
      items: (data.items || []).map(v => ({
        file: v.filename,
        title: v.title || v.filename,
        desc: v.description || v.category || '',
        cat: v.category || '未分类',
        icon: '🎙️',
        url: v.url || `/api/voices/${v.filename}/stream`,
      })),
      categories: Object.keys(data.categories || {}),
      narration: data.narration || { count: 0, sentences: [] },
    };
    return _apiVoices;
  } catch(e) {
    return null;
  }
}

// ============================================================
// 渲染 — API 优先，无后端时使用硬编码数据
// ============================================================
let currentCat = '最终版';

function getCategories() {
  if (_apiVoices && _apiVoices.categories.length) return _apiVoices.categories;
  return ['最终版','初版','参考版','对比','日记','参考'];
}

function renderNav() {
  const nav = document.getElementById('nav');
  const cs = getCategories();
  nav.innerHTML = cs.map(c =>
    `<button class="nav-btn${c===currentCat?' active':''}" onclick="switchCat('${c}')">${c}</button>`
  ).join('');
}

function switchCat(cat) {
  currentCat = cat;
  renderNav();
  renderTracks();
}

async function renderTracks() {
  const list = document.getElementById('trackList');
  if (!_apiVoices) await loadVoicesFromAPI();
  
  let tracks;
  if (_apiVoices) {
    tracks = _apiVoices.items.filter(v => v.cat === currentCat);
  } else {
    tracks = VOICE_DATA.filter(v => v.cat === currentCat);
  }
  
  if (!tracks.length) {
    list.innerHTML = '<div class="empty-cat">这个分类下暂无语音</div>';
    appendNarration(list);
    return;
  }
  
  list.innerHTML = tracks.map((v,i) => {
    const id = `track-${currentCat}-${i}`;
    const url = v.url || `语音/${v.file}`;
    return `<div class="track" id="${id}" onclick="playTrackUrl('${url}','${id}')">
      <div class="track-icon">${v.icon}</div>
      <div class="track-info">
        <div class="track-title">${v.title}</div>
        <div class="track-meta">${v.desc}</div>
      </div>
      <div class="track-wave">${Array.from({length:10},()=>`<div class="track-wave-bar" style="height:${Math.random()*14+4}px"></div>`).join('')}</div>
    </div>`;
  }).join('');
  
  appendNarration(list);
}

function appendNarration(listEl) {
  if (!_apiVoices || !_apiVoices.narration || !_apiVoices.narration.sentences.length) return;
  const sents = _apiVoices.narration.sentences;
  const html = '<h3 style="color:var(--lantern-soft);padding:16px 0 8px;font-size:14px;">🎙️ 念白分句（声音克隆素材）</h3>' +
    sents.map((s,i) => {
      const url = s.url || `/api/voices/narration/${s.filename}`;
      return `<div class="track" onclick="playTrackUrl('${url}', this)" style="border-left:2px solid var(--lantern-glow);">
        <div class="track-icon">🗣️</div>
        <div class="track-info">
          <div class="track-title">念白 · 第${s.index}句</div>
          <div class="track-meta">${s.duration_sec}s · ${s.duration_sec>3?'长句':'短句'}</div>
        </div>
        <div class="track-wave">${Array.from({length:8},()=>`<div class="track-wave-bar" style="height:${Math.random()*10+3}px;background:var(--lantern-glow)"></div>`).join('')}</div>
      </div>`;
    }).join('');
  listEl.insertAdjacentHTML('beforeend', html);
}

// 通用播放器
let _currentAudio = null;
let _currentBtn = null;
function playTrackUrl(url, idOrBtn) {
  if (_currentAudio) { _currentAudio.pause(); }
  if (_currentBtn && typeof _currentBtn === 'object' && _currentBtn.textContent === '⏸') {
    _currentBtn.textContent = '▶';
  }
  
  const audio = new Audio(url);
  _currentAudio = audio;
  
  const btn = typeof idOrBtn === 'string' ? null : idOrBtn;
  if (btn) { btn.textContent = '⏸'; _currentBtn = btn; }
  
  // 高亮轨道
  if (typeof idOrBtn === 'string') {
    document.querySelectorAll('.track.playing').forEach(el => el.classList.remove('playing'));
    const el = document.getElementById(idOrBtn);
    if (el) el.classList.add('playing');
  }
  
  audio.play();
  audio.onended = function() {
    if (btn) btn.textContent = '▶';
    document.querySelectorAll('.track.playing').forEach(el => el.classList.remove('playing'));
  };
}

// 初始化
(async function init() {
  await loadVoicesFromAPI();
  renderNav();
  renderTracks();
})();

// 涟漪
document.addEventListener('click', function(e) {
  const el = e.target.closest('.track, .nav-btn');
  if (!el) return;
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = (e.clientX - rect.left - size/2) + 'px';
  ripple.style.top = (e.clientY - rect.top - size/2) + 'px';
  el.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
});
</script>
</body>
</html>
