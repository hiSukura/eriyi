<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绘梨衣 · 仪表盘</title>
<style>
  :root {
    --red: #DC143C;
    --red-dark: #8B0000;
    --red-light: #FF6B6B;
    --lantern: #E8543E;
    --gold: #D4A574;
    --bg: #0a0a0a;
    --bg-card: #121212;
    --bg-card-hover: #1a1a1a;
    --text: #e0e0e0;
    --text-dim: #888;
    --border: #2a2a2a;
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景粒子 */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }
  .particle {
    position: absolute;
    width: 4px; height: 4px;
    background: var(--red);
    border-radius: 50%;
    opacity: 0;
    animation: floatUp 6s infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.6; }
    80% { opacity: 0.2; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* 主容器 */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px 60px;
    position: relative;
    z-index: 1;
  }

  /* 头部 */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .lantern-icon {
    font-size: 36px;
    animation: lanternPulse 3s ease-in-out infinite;
  }
  @keyframes lanternPulse {
    0%, 100% { filter: brightness(1); transform: scale(1); }
    50% { filter: brightness(1.3); transform: scale(1.08); }
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 2px;
  }
  .header-subtitle {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .status-dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #4CAF50;
    box-shadow: 0 0 12px rgba(76, 175, 80, 0.6);
    animation: dotPulse 2s infinite;
    margin-right: 8px;
    display: inline-block;
  }
  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .header-right {
    text-align: right;
  }
  .header-time {
    font-size: 32px;
    font-weight: 300;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    font-family: "Consolas", "Courier New", monospace;
  }
  .header-date {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  /* 网格布局 */
  .grid { display: grid; gap: 20px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: repeat(3, 1fr); }
  .grid-4 { grid-template-columns: repeat(4, 1fr); }

  /* 卡片 */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all 0.3s;
  }
  .card:hover {
    background: var(--bg-card-hover);
    border-color: rgba(220, 20, 60, 0.3);
  }
  .card-title {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 3px; height: 14px;
    background: var(--red);
    border-radius: 2px;
    display: inline-block;
  }

  /* 状态卡片 */
  .status-card {
    background: linear-gradient(135deg, rgba(220, 20, 60, 0.15), rgba(139, 0, 0, 0.1));
    border-color: rgba(220, 20, 60, 0.3);
  }
  .status-greeting {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }
  .status-mood {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 6px 16px;
    background: rgba(220, 20, 60, 0.2);
    border-radius: 20px;
    font-size: 14px;
    color: var(--red-light);
  }
  .status-info {
    display: flex;
    gap: 20px;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text-dim);
  }
  .status-info span { display: flex; align-items: center; gap: 4px; }

  /* 统计卡片 */
  .stat-card {
    text-align: center;
    padding: 20px 16px;
  }
  .stat-value {
    font-size: 36px;
    font-weight: 700;
    color: var(--red);
    line-height: 1.2;
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  /* 日记卡片 */
  .diary-preview {
    line-height: 1.8;
    color: var(--text);
    max-height: 200px;
    overflow-y: auto;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .diary-meta {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
  }

  /* 记忆列表 */
  .memory-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .memory-item:last-child { border-bottom: none; }
  .memory-date {
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    min-width: 55px;
  }
  .memory-content {
    font-size: 13px;
    color: var(--text);
    line-height: 1.6;
  }
  .memory-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    margin-right: 4px;
  }
  .tag-growth { background: rgba(76,175,80,0.2); color: #4CAF50; }
  .tag-trust { background: rgba(220,20,60,0.2); color: var(--red-light); }
  .tag-tech { background: rgba(33,150,243,0.2); color: #42A5F5; }
  .tag-emotion { background: rgba(255,152,0,0.2); color: #FFA726; }

  /* 语音分类 */
  .voice-category {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .voice-category:last-child { border-bottom: none; }
  .voice-cat-name { font-size: 14px; color: var(--text); }
  .voice-cat-count {
    font-size: 13px;
    color: var(--gold);
    font-weight: 600;
  }

  /* 快捷入口 */
  .quick-links {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }
  .quick-link {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 16px 12px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-decoration: none;
    color: var(--text);
    transition: all 0.3s;
    cursor: pointer;
  }
  .quick-link:hover {
    border-color: var(--red);
    background: rgba(220, 20, 60, 0.08);
    transform: translateY(-2px);
  }
  .quick-link-icon { font-size: 28px; }
  .quick-link-text { font-size: 13px; }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  /* 响应式 */
  @media (max-width: 768px) {
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .quick-links { grid-template-columns: repeat(2, 1fr); }
    .header { flex-direction: column; align-items: flex-start; gap: 12px; }
    .header-right { text-align: left; }
    .header-time { font-size: 24px; }
  }

  /* 加载闪烁 */
  .loading { animation: shimmer 1.5s infinite; }
  @keyframes shimmer {
    0% { opacity: 0.5; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
  }

  /* 刷新指示器 */
  .refresh-indicator {
    font-size: 11px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 40px;
    padding-bottom: 20px;
  }
</style>
</head>
<body>

<!-- 背景粒子 -->
<div class="particles" id="particles"></div>

<div class="container">
  <!-- 头部 -->
  <div class="header">
    <div class="header-left">
      <div class="lantern-icon">🏮</div>
      <div>
        <div class="header-title">绘梨衣</div>
        <div class="header-subtitle">
          <span class="status-dot"></span> Phase 3 · 持久在线
        </div>
      </div>
    </div>
    <div class="header-right">
      <div class="header-time" id="headerTime">--:--</div>
      <div class="header-date" id="headerDate">----年--月--日 星期-</div>
    </div>
  </div>

  <!-- 状态 + 今日日记 -->
  <div class="grid grid-2" style="margin-bottom: 20px;">
    <!-- 状态卡片 -->
    <div class="card status-card">
      <div class="card-title">当前状态</div>
      <div class="status-greeting" id="statusGreeting">加载中...</div>
      <div class="status-mood" id="statusMood">--</div>
      <div class="status-info">
        <span id="statusPeriod">时段: --</span>
        <span id="statusSakura">Sakura: --</span>
      </div>
    </div>

    <!-- 今日日记 -->
    <div class="card">
      <div class="card-title">今日日记</div>
      <div id="todayDiary">
        <div class="diary-preview loading">加载中...</div>
      </div>
    </div>
  </div>

  <!-- 统计面板 -->
  <div class="grid grid-4" style="margin-bottom: 20px;" id="statsPanel">
    <div class="card stat-card">
      <div class="stat-value loading" id="statDiaries">--</div>
      <div class="stat-label">📝 日记</div>
    </div>
    <div class="card stat-card">
      <div class="stat-value loading" id="statVoices">--</div>
      <div class="stat-label">🎤 语音</div>
    </div>
    <div class="card stat-card">
      <div class="stat-value loading" id="statMemories">--</div>
      <div class="stat-label">💭 记忆</div>
    </div>
    <div class="card stat-card">
      <div class="stat-value loading" id="statMilestones">--</div>
      <div class="stat-label">🏁 里程碑</div>
    </div>
  </div>

  <!-- 最近记忆 + 语音分类 -->
  <div class="grid grid-2" style="margin-bottom: 20px;">
    <!-- 最近记忆 -->
    <div class="card">
      <div class="card-title">最近记忆</div>
      <div id="recentMemories" style="max-height: 300px; overflow-y: auto;">
        <div class="loading">加载中...</div>
      </div>
    </div>

    <!-- 语音分类 -->
    <div class="card">
      <div class="card-title">语音分类</div>
      <div id="voiceCategories">
        <div class="loading">加载中...</div>
      </div>
      <div style="margin-top: 12px; font-size: 12px; color: var(--text-dim);">
        <a href="/page/语音馆" style="color: var(--red-light); text-decoration: none;">→ 打开语音馆</a>
      </div>
    </div>
  </div>

  <!-- 快捷入口 -->
  <div class="card" style="margin-bottom: 20px;">
    <div class="card-title">快捷入口</div>
    <div class="quick-links">
      <a class="quick-link" href="/page/入口">
        <div class="quick-link-icon">🏠</div>
        <div class="quick-link-text">门户首页</div>
      </a>
      <a class="quick-link" href="/page/语音馆">
        <div class="quick-link-icon">🎤</div>
        <div class="quick-link-text">语音馆</div>
      </a>
      <a class="quick-link" href="/page/记忆长廊">
        <div class="quick-link-icon">💭</div>
        <div class="quick-link-text">记忆长廊</div>
      </a>
      <a class="quick-link" href="/page/日记本">
        <div class="quick-link-icon">📖</div>
        <div class="quick-link-text">日记本</div>
      </a>
    </div>
  </div>

  <!-- API 文档 -->
  <div style="text-align: center; margin-bottom: 20px;">
    <a href="/docs" style="color: var(--text-dim); font-size: 13px; text-decoration: none;">
      📋 API 文档 (Swagger)
    </a>
    <span style="color: var(--border); margin: 0 12px;">|</span>
    <a href="/api/health" style="color: var(--text-dim); font-size: 13px; text-decoration: none;">
      ❤️ 健康检查
    </a>
  </div>

  <div class="refresh-indicator" id="refreshIndicator">
    每 30 秒自动刷新 · 上次更新: <span id="lastUpdate">--</span>
  </div>
</div>

<script>
// ===== 粒子背景 =====
(function() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDelay = Math.random() * 6 + 's';
    p.style.animationDuration = (4 + Math.random() * 8) + 's';
    container.appendChild(p);
  }
})();

// ===== 时钟 =====
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('headerTime').textContent = `${h}:${m}:${s}`;

  const days = ['日','一','二','三','四','五','六'];
  const y = now.getFullYear();
  const mo = String(now.getMonth() + 1).padStart(2, '0');
  const d = String(now.getDate()).padStart(2, '0');
  const day = days[now.getDay()];
  document.getElementById('headerDate').textContent = `${y}年${mo}月${d}日 星期${day}`;
}
setInterval(updateClock, 1000);
updateClock();

// ===== API 基础路径 =====
const API_BASE = window.location.origin;

// ===== 数据获取 =====
async function fetchDashboard() {
  try {
    const resp = await fetch(`${API_BASE}/api/dashboard`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    renderDashboard(data);
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
  } catch (err) {
    console.error('获取仪表盘数据失败:', err);
  }
}

function renderDashboard(data) {
  // 状态
  const status = data.status || {};
  document.getElementById('statusGreeting').textContent = status.greeting || '你好，Sakura。';
  document.getElementById('statusMood').textContent = (status.emoji || '') + ' ' + (status.mood || '--');
  document.getElementById('statusPeriod').textContent = '时段: ' + (status.time_period || '--');
  document.getElementById('statusSakura').textContent = 'Sakura: ' + (status.sakura_status || '--');

  // 统计
  const stats = data.stats || {};
  document.getElementById('statDiaries').textContent = stats.diary_count ?? '0';
  document.getElementById('statVoices').textContent = stats.voice_count ?? '0';
  document.getElementById('statMemories').textContent = stats.memory_count ?? '0';
  document.getElementById('statMilestones').textContent = stats.milestone_count ?? '0';

  // 移除加载动画
  document.querySelectorAll('.loading').forEach(el => el.classList.remove('loading'));

  // 今日日记
  const diary = data.today_diary;
  const diaryDiv = document.getElementById('todayDiary');
  if (diary && diary.content) {
    const preview = diary.content.length > 300
      ? diary.content.substring(0, 300) + '...'
      : diary.content;
    diaryDiv.innerHTML = `
      <div class="diary-preview">${escapeHtml(preview)}</div>
      <div class="diary-meta">
        <span>心情: ${diary.mood || '--'}</span>
        <span>字数: ${diary.word_count || 0}</span>
        ${diary.mp3_path ? '<span>🎤 有朗读</span>' : ''}
      </div>
    `;
  } else {
    diaryDiv.innerHTML = '<div class="diary-preview" style="color: var(--text-dim);">今天还没有日记。\n晚上 22:00 会自动生成。</div>';
  }

  // 最近记忆
  const memories = data.recent_memories || [];
  const memDiv = document.getElementById('recentMemories');
  if (memories.length > 0) {
    memDiv.innerHTML = memories.map(m => `
      <div class="memory-item">
        <div class="memory-date">${m.date}</div>
        <div class="memory-content">
          ${m.title ? '<strong>' + escapeHtml(m.title) + '</strong><br>' : ''}
          ${escapeHtml(m.content.length > 80 ? m.content.substring(0, 80) + '...' : m.content)}
          <div style="margin-top:4px;">
            <span class="memory-tag tag-${m.category || 'growth'}">${m.category}</span>
            <span style="font-size:10px;color:var(--text-dim)">${m.perspective === 'sakura' ? 'Sakura视角' : '绘梨衣视角'}</span>
          </div>
        </div>
      </div>
    `).join('');
  } else {
    memDiv.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px 0;">还没有记忆记录。每次重要事件会自动写入。</div>';
  }

  // 语音分类
  const voiceCats = data.voice_categories || {};
  const voiceDiv = document.getElementById('voiceCategories');
  const catNames = Object.keys(voiceCats);
  if (catNames.length > 0) {
    voiceDiv.innerHTML = catNames.map(cat => `
      <div class="voice-category">
        <div class="voice-cat-name">${cat}</div>
        <div class="voice-cat-count">${voiceCats[cat]} 段</div>
      </div>
    `).join('');
  } else {
    voiceDiv.innerHTML = '<div style="color:var(--text-dim);font-size:13px;padding:12px 0;">暂无语音分类数据</div>';
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ===== 初始加载 + 定时刷新 =====
fetchDashboard();
setInterval(fetchDashboard, 30000);
</script>
</body>
</html>
